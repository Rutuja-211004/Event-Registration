<h2>Edit Participant</h2>
<form method="POST">
    Name: <input type="text" name="name" value="{{ participant.name }}" required><br>
    Event: <input type="text" name="event" value="{{ participant.event }}" required><br>
    Project Name: <input type="text" name="project" value="{{ participant.project }}" required><br>
    <input type="submit" value="Update">
</form>
